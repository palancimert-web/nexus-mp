<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#060A14;--surface:#0C1220;--panel:#111827;--border:#1A2638;--muted:#243347;
  --text:#E8EDF5;--sub:#5A7A9A;--accent:#7B6FFA;--cyan:#00CFFF;--green:#00F59C;
  --red:#FF5F5F;--yellow:#FFB300;--orange:#FF7A30;--purple:#C084FC;
  --font:'Space Grotesk',sans-serif;--mono:'JetBrains Mono',monospace;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);}body{padding-top:env(safe-area-inset-top,0px);}
#app{display:flex;flex-direction:column;height:100dvh;}
#topbar{padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.logo{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--accent);letter-spacing:3px;}
.logo span{color:var(--cyan);}
#clockbadge{font-family:var(--mono);font-size:10px;color:var(--sub);background:var(--panel);border:1px solid var(--border);padding:3px 8px;border-radius:20px;}
#statuslbl-wrap{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--sub);background:var(--panel);border:1px solid var(--border);padding:3px 8px;border-radius:20px;margin-left:auto;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
#main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
#view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#view::-webkit-scrollbar{display:none;}
#bottomnav{display:flex;background:var(--surface);border-top:1px solid var(--border);padding:6px 0 calc(var(--sb)+6px);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;};background:var(--surface);border-top:1px solid var(--border);padding:6px 0 calc(var(--sb)+6px);flex-shrink:0;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px 0;color:var(--sub);font-size:8px;font-family:var(--mono);transition:color .15s;}
.nav-btn .ni{font-size:18px;line-height:1;}
.nav-btn.active{color:var(--accent);}
.nav-btn.active .ni{filter:drop-shadow(0 0 5px var(--accent));}
#inputbar{padding:10px 12px calc(var(--sb)+10px);background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;display:none;}
.mode-row{display:flex;gap:6px;margin-bottom:8px;overflow-x:auto;}
.mode-row::-webkit-scrollbar{display:none;}
.mchip{flex-shrink:0;padding:4px 10px;border-radius:20px;font-size:10px;font-family:var(--mono);border:1px solid var(--border);color:var(--sub);background:none;cursor:pointer;transition:all .15s;}
.mchip.on{color:#fff;border-color:transparent;}
.input-row{display:flex;gap:8px;align-items:flex-end;}
#msginput{flex:1;background:var(--panel);border:1.5px solid var(--border);border-radius:14px;padding:10px 14px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;resize:none;max-height:100px;line-height:1.5;transition:border-color .2s;}
#msginput:focus{border-color:var(--accent);}
#msginput::placeholder{color:var(--sub);}
#sendbtn{width:42px;height:42px;border-radius:13px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--cyan));border:none;cursor:pointer;font-size:18px;color:#fff;display:flex;align-items:center;justify-content:center;transition:opacity .2s;box-shadow:0 4px 16px rgba(123,111,250,.35);}
#sendbtn:disabled{opacity:.3;box-shadow:none;}
.pad{padding:16px;}
.sec-hdr{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:1.5px;font-family:var(--mono);margin-bottom:12px;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:10px;}
.card-hdr{padding:9px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.02);}
.card-icon{font-size:15px;}
.card-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--sub);font-family:var(--mono);}
.card-body{padding:12px 14px;font-size:13px;line-height:1.7;}
.card-body p{margin-bottom:5px;}
.card-body p:last-child{margin-bottom:0;}

/* BULLETIN */
.bul-wrap{padding:14px;display:flex;flex-direction:column;gap:10px;padding-bottom:24px;}
.bul-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:65vh;gap:14px;}
.bul-loading-icon{font-size:38px;animation:rot 2s linear infinite;}
@keyframes rot{to{transform:rotate(360deg)}}
.bul-header{background:linear-gradient(135deg,rgba(123,111,250,.15),rgba(0,207,255,.08));border:1px solid rgba(123,111,250,.25);border-radius:16px;padding:14px;display:flex;align-items:center;justify-content:space-between;}
.bul-edition{font-size:10px;font-family:var(--mono);color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:3px;}
.bul-title{font-size:16px;font-weight:700;}
.bul-date{font-size:10px;color:var(--sub);margin-top:2px;font-family:var(--mono);}
.market-row{display:flex;gap:5px;flex-wrap:wrap;padding:8px 12px 4px;}
.mpill{flex:1;min-width:68px;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:7px 9px;}
.mpill-label{font-size:8px;font-family:var(--mono);color:var(--sub);text-transform:uppercase;margin-bottom:2px;}
.mpill-val{font-size:12px;font-weight:700;font-family:var(--mono);}
.mpill-chg{font-size:9px;font-family:var(--mono);}
.up{color:var(--green);}.dn{color:var(--red);}.fl{color:var(--sub);}
.refresh-row{display:flex;gap:8px;}
.rbtn{flex:1;padding:10px;border-radius:11px;background:var(--panel);border:1px solid var(--border);color:var(--sub);font-size:11px;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .2s;text-decoration:none;}
.rbtn.primary{background:linear-gradient(135deg,rgba(123,111,250,.2),rgba(0,207,255,.1));border-color:rgba(123,111,250,.3);color:var(--text);}
.rbtn:active{opacity:.75;}
.pf-mini-row{display:flex;align-items:center;gap:8px;padding:6px 14px;border-bottom:1px solid rgba(26,38,56,.5);}
.pf-mini-row:last-child{border-bottom:none;}
.pf-mini-tick{font-family:var(--mono);font-size:11px;font-weight:700;width:46px;flex-shrink:0;}
.pf-mini-qty{font-size:10px;color:var(--sub);flex:1;font-family:var(--mono);}
.pf-mini-total{font-size:11px;font-family:var(--mono);font-weight:600;}

/* QUOTE */
.quote-card{background:linear-gradient(135deg,rgba(192,132,252,.08),rgba(123,111,250,.05));border:1px solid rgba(192,132,252,.2);border-radius:14px;padding:16px;}
.quote-text{font-size:14px;line-height:1.7;color:var(--text);font-style:italic;margin-bottom:8px;}
.quote-author{font-size:11px;color:var(--purple);font-family:var(--mono);}

/* WHOOP */
.whoop-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px 14px;}
.wcard{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
.wcard-icon{font-size:20px;margin-bottom:4px;}
.wcard-val{font-size:18px;font-weight:700;font-family:var(--mono);}
.wcard-lbl{font-size:9px;color:var(--sub);font-family:var(--mono);text-transform:uppercase;margin-top:2px;}
.whoop-connect{padding:16px;text-align:center;}
.whoop-connect p{font-size:12px;color:var(--sub);margin-bottom:12px;line-height:1.5;}
.connect-btn{display:inline-block;padding:11px 20px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--cyan));color:#fff;font-size:13px;font-weight:600;border:none;cursor:pointer;font-family:var(--font);}

/* MORTY */
.morty-header{display:flex;align-items:center;gap:12px;padding:14px;}
.morty-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#8B5CF6,#EC4899);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.morty-name{font-size:16px;font-weight:700;}
.morty-breed{font-size:11px;color:var(--sub);font-family:var(--mono);}
.morty-age{font-size:11px;color:var(--cyan);font-family:var(--mono);}
.vet-list{display:flex;flex-direction:column;gap:6px;padding:0 14px 14px;}
.vet-item{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:9px 12px;}
.vet-icon{font-size:16px;width:24px;text-align:center;}
.vet-text{flex:1;font-size:12px;}
.vet-freq{font-size:10px;color:var(--sub);font-family:var(--mono);}

/* BIRTHDAY */
.bday-list{display:flex;flex-direction:column;gap:8px;}
.bday-item{background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:12px 14px;display:flex;align-items:center;gap:12px;}
.bday-emoji{font-size:24px;flex-shrink:0;}
.bday-info{flex:1;}
.bday-name{font-size:13px;font-weight:600;}
.bday-date{font-size:11px;color:var(--sub);font-family:var(--mono);}
.bday-days{font-size:11px;font-family:var(--mono);font-weight:700;}
.bday-add{width:100%;padding:11px;border-radius:11px;background:var(--panel);border:1.5px dashed var(--border);color:var(--sub);font-size:12px;font-family:var(--font);cursor:pointer;margin-top:8px;transition:all .2s;}
.bday-add:active{border-color:var(--accent);color:var(--text);}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;gap:12px;padding:14px;}
.msg{display:flex;gap:10px;}
.msg.user{flex-direction:row-reverse;}
.avatar{width:28px;height:28px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
.msg.ai .avatar{background:linear-gradient(135deg,var(--accent),var(--cyan));color:#fff;}
.msg.user .avatar{background:var(--panel);border:1px solid var(--border);color:var(--sub);}
.mbody{flex:1;min-width:0;}
.mmeta{font-size:9px;color:var(--sub);font-family:var(--mono);margin-bottom:3px;}
.msg.user .mmeta{text-align:right;}
.bubble{padding:9px 12px;border-radius:12px;font-size:13px;line-height:1.65;word-break:break-word;}
.msg.ai .bubble{background:var(--panel);border:1px solid var(--border);border-top-left-radius:3px;}
.msg.user .bubble{background:rgba(123,111,250,.18);border:1px solid rgba(123,111,250,.35);border-top-right-radius:3px;}
.bubble p{margin-bottom:5px;}
.bubble p:last-child{margin-bottom:0;}
.bubble strong{color:var(--accent);}
.typing{display:flex;gap:4px;align-items:center;padding:10px 12px;}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:b .9s infinite;}
.typing span:nth-child(2){animation-delay:.15s;}
.typing span:nth-child(3){animation-delay:.3s;}
@keyframes b{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* PORTFOLIO */
.pf-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:12px;}
.stat-lbl{font-size:9px;font-family:var(--mono);text-transform:uppercase;letter-spacing:1px;color:var(--sub);margin-bottom:5px;}
.stat-val{font-size:17px;font-weight:700;font-family:var(--mono);}
.pf-list{display:flex;flex-direction:column;gap:5px;}
.pf-row{background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:9px 13px;display:flex;align-items:center;gap:8px;}
.pf-tick{font-family:var(--mono);font-weight:700;font-size:12px;width:48px;}
.pf-info{flex:1;}
.pf-qty{font-size:10px;color:var(--sub);font-family:var(--mono);}
.pf-cv{font-size:10px;color:var(--sub);font-family:var(--mono);}
.pf-tot{font-family:var(--mono);font-size:12px;font-weight:600;}
.warn-badge{font-size:8px;padding:1px 4px;border-radius:3px;background:rgba(255,95,95,.15);color:var(--red);font-family:var(--mono);}

/* TASKS */
.task-add{width:100%;background:var(--panel);border:1.5px dashed var(--border);border-radius:11px;padding:10px 13px;color:var(--text);font-family:var(--font);font-size:13px;outline:none;margin-bottom:10px;transition:border-color .2s;}
.task-add:focus{border-color:var(--accent);border-style:solid;}
.task-add::placeholder{color:var(--sub);}
.task-list{display:flex;flex-direction:column;gap:6px;}
.task-row{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 13px;display:flex;align-items:flex-start;gap:9px;}
.chk{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--muted);flex-shrink:0;cursor:pointer;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;transition:all .2s;}
.chk.done{background:var(--green);border-color:var(--green);color:#000;}
.task-txt{flex:1;font-size:12px;line-height:1.5;}
.task-txt.done{text-decoration:line-through;color:var(--sub);}
.ttag{font-size:9px;padding:2px 6px;border-radius:20px;font-family:var(--mono);flex-shrink:0;}
.cb-wrap{background:var(--panel);border:1px solid rgba(123,111,250,.2);border-radius:13px;padding:13px;}
.cb-title{font-size:10px;font-family:var(--mono);color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
.cb-btns{display:flex;gap:6px;flex-wrap:wrap;}
.cb-btn{padding:7px 11px;border-radius:8px;font-size:11px;font-family:var(--font);font-weight:500;cursor:pointer;border:none;display:flex;align-items:center;gap:4px;transition:transform .15s;}
.cb-btn:active{transform:scale(.95);}
.cb-btn.cal{background:rgba(0,245,156,.1);color:var(--green);border:1px solid rgba(0,245,156,.2);}
.cb-btn.rem{background:rgba(255,179,0,.1);color:var(--yellow);border:1px solid rgba(255,179,0,.2);}
.cb-btn.mail{background:rgba(0,207,255,.1);color:var(--cyan);border:1px solid rgba(0,207,255,.2);}
.cb-btn.pf{background:rgba(123,111,250,.1);color:var(--accent);border:1px solid rgba(123,111,250,.2);}
#toast{position:fixed;bottom:calc(var(--sb)+80px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:9px 16px;font-size:11px;font-family:var(--mono);opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:999;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.bul-step{font-size:11px;font-family:var(--mono);color:var(--sub);display:flex;align-items:center;gap:7px;transition:color .3s;}
.bul-step.done{color:var(--green);}.bul-step.active{color:var(--cyan);}
.bul-step-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}
</style>
</head>

      headers:{
        'Content-Type':'application/json',

      },
      body:JSON.stringify(payload)
    });
    if(!res.ok){const e=await res.text();console.error('API:',res.status,e);return '';}

async function fetchBulletin(force){
  // Cache kontrolü
  if(!force&&STATE.lastBulletin&&STATE.lastBulletinTime&&(Date.now()-STATE.lastBulletinTime)/60000<60){
    renderBulletin(STATE.lastBulletin);return;
  }
  // Fallback veriyi hemen göster
  const fb=fallback();
  STATE.lastBulletin=fb;
  STATE.lastBulletinTime=Date.now();
  renderBulletin(fb);
}

    <div style="font-size:14px;font-weight:600;color:var(--text)">Bülten hazırlanıyor</div>

}

function formatBulletin(text){
  if(!text||text==='—')return '<p style="color:var(--sub)">—</p>';
  const sentences=text.split(/\.\s+/).filter(s=>s.trim().length>15);
  if(sentences.length<=1)return '<p style="font-size:13px;line-height:1.6">'+text+'</p>';
  return sentences.map(s=>
    '<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid rgba(26,38,56,.2);align-items:flex-start">'
    +'<span style="color:var(--accent);flex-shrink:0;margin-top:4px;font-size:10px;font-weight:700">▸</span>'
    +'<span style="font-size:12px;line-height:1.55;color:var(--text)">'+s.trim()+(s.trim().endsWith('.')?'':'.')+'</span>'
    +'</div>'
  ).join('');
}

// WHOOP
function renderWhoop(){
  document.getElementById('inputbar').style.display='none';
  if(STATE.whoopData){renderWhoopData(STATE.whoopData);return;}
  // check localStorage for tokens
  const stored=localStorage.getItem('whoop_tokens');
  if(stored){
    STATE.whoopTokens=JSON.parse(stored);
    loadWhoopData();return;
  }
  document.getElementById('view').innerHTML=`<div class="pad">
    <div class="sec-hdr">Whoop Sağlık</div>
    <div class="card">
      <div class="card-hdr"><span class="card-icon">💚</span><span class="card-title">Whoop Bağlantısı</span></div>
      <div class="whoop-connect">
        <p>Whoop verilerine bağlanmak için hesabınla giriş yap.</p>
        <button class="connect-btn" onclick="connectWhoop()">💚 Whoop'a Bağlan</button>
      </div>
    </div>
  </div>`;
}

function connectWhoop(){
  const scope='offline read:recovery read:sleep read:workout read:cycles read:body_measurement read:profile';
  const url=`https://api.prod.whoop.com/oauth/oauth2/auth?client_id=${CLIENT_ID}&redirect_uri=https://localhost/&response_type=code&scope=${encodeURIComponent(scope)}&state=nexus12345`;
  window.open(url,'_blank');
  setTimeout(()=>{
    const code=prompt('Yönlendirilen URL\'den code= parametresini yapıştır:');
    if(code)exchangeWhoopCode(code.trim());
  },2000);
}

async function exchangeWhoopCode(code){
  toast('Token alınıyor…','var(--cyan)');
  try{
    const d=await whoopCall({action:'exchange',code});
    if(d.access_token){
      STATE.whoopTokens=d;
      localStorage.setItem('whoop_tokens',JSON.stringify(d));
      loadWhoopData();
    }else{toast('Bağlantı hatası','var(--red)');}
  }catch{toast('Whoop API hatası','var(--red)');}
}

async function loadWhoopData(){
  document.getElementById('view').innerHTML=`<div class="pad"><div class="sec-hdr">Whoop</div><div style="text-align:center;padding:40px;color:var(--sub)"><div style="font-size:30px;animation:rot 2s linear infinite">💚</div><p style="margin-top:12px;font-family:var(--mono);font-size:11px">Veri yükleniyor…</p></div></div>`;
  try{
    let tokens=STATE.whoopTokens;
    const d=await whoopCall({action:'data',access_token:tokens.access_token});
    if(d.error&&d.error.includes('401')){
      // refresh
      const refreshed=await whoopCall({action:'refresh',refresh_token:tokens.refresh_token});
      if(refreshed.access_token){
        STATE.whoopTokens=refreshed;
        localStorage.setItem('whoop_tokens',JSON.stringify(refreshed));
        const d2=await whoopCall({action:'data',access_token:refreshed.access_token});
        STATE.whoopData=d2;renderWhoopData(d2);
      }
    }else{STATE.whoopData=d;renderWhoopData(d);}
  }catch{toast('Whoop veri hatası','var(--red)');}
}

function renderWhoopData(d){
  const rec=d.recovery?.records?.[0]?.score||{};
  const sleep=d.sleep?.records?.[0]?.score||{};
  const cycle=d.cycles?.records?.[0]||{};
  const recScore=rec.recovery_score||'—';
  const sleepScore=sleep.sleep_performance_percentage||'—';
  const strain=cycle.score?.strain||'—';
  const hrv=rec.hrv_rmssd_milli?Math.round(rec.hrv_rmssd_milli)+'ms':'—';
  const rhr=rec.resting_heart_rate?Math.round(rec.resting_heart_rate)+' bpm':'—';
  const sleepHrs=sleep.total_in_bed_time_milli?(sleep.total_in_bed_time_milli/3600000).toFixed(1)+'s':'—';

  const recColor=typeof recScore==='number'?(recScore>=67?'var(--green)':recScore>=34?'var(--yellow)':'var(--red)'):'var(--sub)';
  const sleepColor=typeof sleepScore==='number'?(sleepScore>=85?'var(--green)':sleepScore>=70?'var(--yellow)':'var(--red)'):'var(--sub)';

  document.getElementById('view').innerHTML=`<div class="pad">
    <div class="sec-hdr">Whoop · Günlük Sağlık</div>
    <div class="card" style="margin-bottom:10px">
      <div class="card-hdr"><span class="card-icon">💚</span><span class="card-title">Genel Durum</span></div>
      <div class="whoop-grid">
        <div class="wcard">
          <div class="wcard-icon">🔋</div>
          <div class="wcard-val" style="color:${recColor}">${typeof recScore==='number'?recScore+'%':recScore}</div>
          <div class="wcard-lbl">Recovery</div>
        </div>
        <div class="wcard">
          <div class="wcard-icon">😴</div>
          <div class="wcard-val" style="color:${sleepColor}">${typeof sleepScore==='number'?sleepScore+'%':sleepScore}</div>
          <div class="wcard-lbl">Uyku</div>
        </div>
        <div class="wcard">
          <div class="wcard-icon">⚡</div>
          <div class="wcard-val" style="color:var(--orange)">${typeof strain==='number'?strain.toFixed(1):strain}</div>
          <div class="wcard-lbl">Strain</div>
        </div>
        <div class="wcard">
          <div class="wcard-icon">💓</div>
          <div class="wcard-val" style="color:var(--red)">${rhr}</div>
          <div class="wcard-lbl">RHR</div>
        </div>
        <div class="wcard">
          <div class="wcard-icon">📊</div>
          <div class="wcard-val" style="color:var(--cyan)">${hrv}</div>
          <div class="wcard-lbl">HRV</div>
        </div>
        <div class="wcard">
          <div class="wcard-icon">🛏</div>
          <div class="wcard-val" style="color:var(--accent)">${sleepHrs}</div>
          <div class="wcard-lbl">Uyku Süresi</div>
        </div>
      </div>
    </div>
    <button class="rbtn primary" onclick="loadWhoopData()" style="width:100%;margin-bottom:10px">⟳ Yenile</button>
    <button class="rbtn" onclick="localStorage.removeItem('whoop_tokens');STATE.whoopTokens=null;STATE.whoopData=null;renderWhoop();" style="width:100%;color:var(--red)">Bağlantıyı Kes</button>
    <div style="height:20px"></div>
  </div>`;
}

    document.getElementById('pf-pnl').textContent=sign+'$'+fmt(totalPnl);

    document.getElementById('pf-pnlpct').style.color=pnlCol;
    document.getElementById('price-status').textContent='· '+new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})+' güncellendi';

    // Watchlist fiyatları
    try{

        const pr=wlPrices[t];if(!pr)return;
        const chgCol=pr.changePct>=0?'var(--green)':'var(--red)';
        const sign=pr.changePct>=0?'+':'';
        const pEl=document.getElementById('wlp-'+t);
        if(pEl){pEl.textContent='$'+pr.price.toFixed(2);pEl.style.color=chgCol;}
        const cEl=document.getElementById('wlch-'+t);
        if(cEl){cEl.textContent=sign+pr.changePct.toFixed(2)+'%';cEl.style.color=chgCol;}
        const cEl2=document.getElementById('wlc-'+t);

          cEl2.innerHTML=`<span style="color:${chgCol}">${chgSign}$${pr.change.toFixed(2)}</span> · önceki kapanış $${pr.prevClose.toFixed(2)}`;
        }
      });
      document.getElementById('wl-status').textContent='· güncellendi';
    }catch{}
  }catch(e){
    document.getElementById('price-status').textContent='· fiyat alınamadı';
  }
}

function filterTasks(tag){
  STATE.taskFilter=tag;
  renderTaskList();
}

function renderTaskList(){
  const tl=document.getElementById('tasklist');if(!tl)return;
  const filter=STATE.taskFilter||'';
  const tasks=filter?STATE.tasks.filter(t=>t.tag===filter):STATE.tasks;
  tl.innerHTML=tasks.map(t=>`<div class="task-row" id="tr-${t.id}" style="transition:all .3s;${t.done?'opacity:.4':''}">
    <div class="chk ${t.done?'done':''}" onclick="toggleTask(${t.id})">${t.done?'✓':''}</div>
    <div class="task-txt ${t.done?'done':''}" style="flex:1">${t.text}</div>
    <span class="ttag" style="background:${t.col}22;color:${t.col};border:1px solid ${t.col}44;margin-right:4px">${t.tag}</span>
    <div onclick="deleteTask(${t.id})" style="color:var(--sub);font-size:16px;cursor:pointer;padding:0 4px;flex-shrink:0">×</div>
  </div>`).join('');
}

function toggleTask(id){
  const t=STATE.tasks.find(t=>t.id===id);
  if(!t)return;
  if(t.done){
    // Zaten tamamlanmış — kaldır
    const el=document.getElementById('tr-'+id);
    if(el){el.style.opacity='0';el.style.transform='translateX(100px)';}
    setTimeout(()=>{
      STATE.tasks=STATE.tasks.filter(t=>t.id!==id);
      renderTaskList();
    },300);
  } else {
    // Tamamla ve 1.5 saniye sonra kaldır
    STATE.tasks=STATE.tasks.map(t=>t.id===id?{...t,done:true}:t);
    renderTaskList();
    setTimeout(()=>{
      const el=document.getElementById('tr-'+id);
      if(el){el.style.opacity='0';el.style.transform='translateX(100px)';}
      setTimeout(()=>{
        STATE.tasks=STATE.tasks.filter(t=>t.id!==id);
        renderTaskList();
        // Header'ı güncelle
        const hdr=document.querySelector('.sec-hdr');
        if(hdr)hdr.textContent='Görevler · '+STATE.tasks.filter(t=>!t.done).length+' bekliyor';
      },300);
    },1200);
  }
}

function deleteTask(id){
  const el=document.getElementById('tr-'+id);
  if(el){el.style.opacity='0';el.style.transform='translateX(100px)';}
  setTimeout(()=>{
    STATE.tasks=STATE.tasks.filter(t=>t.id!==id);
    renderTaskList();
  },300);
}

function toggleCoTask(cid,idx){
  const saved=JSON.parse(localStorage.getItem('nexus_co_tasks')||'{}');
  const c=COMPANIES.find(x=>x.id===cid);
  if(!saved[cid])saved[cid]=c.tasks.map(t=>({text:t,done:false}));
  saved[cid][idx].done=!saved[cid][idx].done;
  localStorage.setItem('nexus_co_tasks',JSON.stringify(saved));
  renderCompanies();
}

function addCoTask(e,cid){
  if(e.key!=='Enter'||!e.target.value.trim())return;
  const saved=JSON.parse(localStorage.getItem('nexus_co_tasks')||'{}');
  const c=COMPANIES.find(x=>x.id===cid);
  if(!saved[cid])saved[cid]=c.tasks.map(t=>({text:t,done:false}));
  saved[cid].push({text:e.target.value.trim(),done:false});
  localStorage.setItem('nexus_co_tasks',JSON.stringify(saved));
  e.target.value='';
  renderCompanies();
}

// BIRTHDAYS
function daysUntil(mmdd){
  const today=new Date();
  const [m,d]=mmdd.split('-').map(Number);
  let next=new Date(today.getFullYear(),m-1,d);
  if(next<today)next=new Date(today.getFullYear()+1,m-1,d);
  return Math.ceil((next-today)/(1000*60*60*24));
}

// TAB
function switchTab(tab){
  STATE.tab=tab;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.getElementById('inputbar').style.display='none';
  if(tab==='bulletin')fetchBulletin(false);
  else if(tab==='chat')renderChat();
  else if(tab==='companies')renderCompanies();
  else if(tab==='portfolio')renderPortfolio();
  else if(tab==='birthdays')renderBirthdays();
  else if(tab==='morty')renderMorty();
  else if(tab==='puro')renderPuro();
  else if(tab==='tasks')renderTasks();
}

// INPUT
const inp=document.getElementById('msginput'),btn=document.getElementById('sendbtn');
inp.addEventListener('input',()=>{btn.disabled=!inp.value.trim()||STATE.loading;inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,100)+'px';});
inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
btn.addEventListener('click',sendMsg);

switchTab('bulletin');
</script>
